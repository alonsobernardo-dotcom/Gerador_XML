<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gerador OBPIX - SIAFI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="card">

        <!-- LADO ESQUERDO -->
        <div class="left">
            <h1>Gerador de XML</h1>
            <p>
                Geração de XML para exportação de pagamentos no SIAFI.
            </p>
            <p>
                Suporta OBC e OBPIX.
            </p>
        </div>

        <!-- LADO DIREITO -->
        <div class="right">

            <h2>Preencha os dados abaixo:</h2>

            <label>Código Layout</label>
            <input type="text" id="codigoLayout" value="DH001">

            <label>Data Geração</label>
            <input type="date" id="dataGeracao">

            <label>Sequencial</label>
            <input type="number" id="sequencial" value="1">

            <label>Ano Referência</label>
            <input type="number" id="anoReferencia">

            <label>UG Responsável</label>
            <input type="text" id="ugResponsavel">

            <label>CPF Responsável</label>
            <input type="text" id="cpfResponsavel">

            <label>SIORG</label>
            <input type="text" id="siorg">

            <label>Planilha</label>
            <input type="file" id="arquivo">

            <button class="primary" onclick="processar()">Gerar XML</button>
            <button class="secondary" onclick="baixarModelo()">Baixar Modelo</button>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="script.js"></script>

</body>
</html>
